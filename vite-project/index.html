<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Three.js Scene</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #container {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }

      canvas {
        touch-action: none;
        display: block;
      }

      #buttons {
        position: fixed;
        bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 100;
      }

      #buttons button {
        padding: 12px 24px;
        font-size: 14px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        border-radius: 8px;
        transition: background 0.2s;
      }

      #buttons button:hover {
        background: rgba(255, 255, 255, 1);
      }

      #instructions-overlay {
        position: fixed;
        top: calc(20px + env(safe-area-inset-top, 0px));
        left: calc(20px + env(safe-area-inset-left, 0px));
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        padding: 20px;
        border-radius: 8px;
        max-width: 300px;
        z-index: 200;
        transition: opacity 0.4s ease, transform 0.4s ease;
      }

      #instructions-overlay.anim-playing {
        opacity: 0.1;
        pointer-events: none;
      }

      #instructions-overlay.collapsed #instruction-text {
        display: none;
      }

      #overlay-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      #instructions-overlay h2 {
        font-size: 18px;
        color: #fff;
      }

      #collapse-btn {
        background: none;
        border: none;
        color: rgba(255,255,255,0.7);
        cursor: pointer;
        font-size: 14px;
        padding: 0 0 0 12px;
        line-height: 1;
        flex-shrink: 0;
      }

      #collapse-btn:hover {
        color: #fff;
      }

      #instructions-overlay p {
        font-size: 14px;
        line-height: 1.5;
        color: #ccc;
      }

      @media (max-width: 768px) {
        #buttons {
          bottom: 20px;
          left: 20px;
          right: 20px;
          transform: none;
          gap: 8px;
          flex-wrap: wrap;
          justify-content: center;
          padding: 0;
        }

        #buttons button {
          padding: 10px 16px;
          font-size: 14px;
          flex: 1 1 calc(50% - 4px);
        }

        #btn-reset {
          flex: 1 1 100%;
        }

        #instructions-overlay {
          top: calc(10px + env(safe-area-inset-top, 0px));
          left: calc(10px + env(safe-area-inset-left, 0px));
          right: calc(10px + env(safe-area-inset-right, 0px));
          max-width: none;
          padding: 16px;
        }

        #instructions-overlay h2 {
          font-size: 20px;
        }

        #instructions-overlay p {
          font-size: 15px;
        }
      }

      @media (max-width: 480px) {
        #buttons {
          bottom: 16px;
          left: 20px;
          right: 20px;
          transform: none;
        }

        #buttons button {
          padding: 10px 12px;
          font-size: 14px;
          flex: 1 1 calc(50% - 4px);
        }

        #btn-reset {
          flex: 1 1 100%;
        }
      }

      #loading-overlay {
        position: fixed;
        inset: 0;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: opacity 0.6s ease;
      }

      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        width: 52px;
        height: 52px;
        border: 4px solid rgba(255,255,255,0.15);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #loading-overlay p {
        margin-top: 18px;
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        letter-spacing: 0.05em;
      }

      #zoom-buttons {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 100;
      }

      #zoom-buttons button {
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.25);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background 0.15s;
        user-select: none;
        -webkit-user-select: none;
      }

      #zoom-buttons button:hover {
        background: rgba(255, 255, 255, 0.45);
      }

      #zoom-buttons button:active {
        background: rgba(255, 255, 255, 0.65);
      }

      @media (max-width: 768px) {
        #zoom-buttons {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- <button onclick="playAction('DoorOpen')">Open Door</button>
    <button onclick="playAction('DoorClose')">Close Door</button> -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>
    <div id="container"></div>
    <div id="instructions-overlay">
      <div id="overlay-header">
        <h2 id="instruction-heading">Welcome</h2>
        <button id="collapse-btn" aria-label="Toggle instructions">▼</button>
      </div>
      <p id="instruction-text">Click any step button below to see product instructions.</p>
    </div>
    <div id="buttons">
      <button id="btn-1">Step 1</button>
      <button id="btn-2">Step 2</button>
      <button id="btn-3">Step 3</button>
      <button id="btn-4">Step 4</button>
      <button id="btn-reset">Reset</button>
    </div>
    <div id="zoom-buttons">
      <button id="btn-zoom-in" aria-label="Zoom in">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="6.5"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21"/>
          <line x1="10" y1="7" x2="10" y2="13"/>
          <line x1="7" y1="10" x2="13" y2="10"/>
        </svg>
      </button>
      <button id="btn-zoom-out" aria-label="Zoom out">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="6.5"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21"/>
          <line x1="7" y1="10" x2="13" y2="10"/>
        </svg>
      </button>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
